<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  /* Committed Inter variable font (latin subset) — deterministic render on any
     machine; no system-font or network dependency. License: fonts/OFL.txt. */
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 100 900;
    src: url('./fonts/Inter-Variable-latin.woff2') format('woff2');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #F4F3EE;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px 80px 64px;
    overflow: hidden;
  }
  .lockup { display: flex; align-items: center; gap: 20px; }
  .lockup svg { height: 56px; width: auto; }
  .wordmark { font-size: 40px; font-weight: 700; letter-spacing: -0.8px; color: #1A1A17; }
  .wordmark em { font-style: italic; color: #3C6650; }
  .headline {
    font-size: 88px;
    font-weight: 700;
    letter-spacing: -2.4px;
    line-height: 1.04;
    color: #1A1A17;
    max-width: 1000px;
  }
  .headline .accent { color: #3C6650; }
  .meta { display: flex; align-items: center; gap: 28px; font-size: 26px; font-weight: 500; color: #6B7280; }
  .meta .dot { width: 6px; height: 6px; border-radius: 50%; background: #CFE0D6; }
</style>
</head>

  <div class="lockup">
