[pytest]
# Single source of test configuration for the backend suite.
# Markers were previously registered in tests/conftest.py's pytest_configure; they
# live here now so there is exactly one place that defines them.
testpaths = tests
# Fast lane by default: the performance suite (real sleeps) is deselected and run in a dedicated
# CI step (see .github/workflows/ci.yml). `slow` is registered but intentionally NOT deselected —
# it has no separate CI execution path, so slow-marked tests run in the default lane rather than
# being silently skipped. Run the full set with `python -m pytest -m ""`.
addopts = -m "not performance"
markers =
    smoke: mark test as a smoke test (critical path validation)
    integration: mark test as an integration test
    performance: mark test as a performance test
    slow: mark test as slow-running
    requires_db: needs a database; NO auto-skip — the marked test must handle unavailability itself
    unit: mark test as a unit test
