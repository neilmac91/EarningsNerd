name: Refresh index membership

# Regenerates backend/app/data/index_membership.json (the S&P 500 ∪ Nasdaq 100 universe the earnings
# calendar filters to) from the current index constituents, and opens a PR ONLY when the indexes have
# actually changed. This keeps the committed-list design — auditable, human-merged, un-corruptable by a
# bad runtime fetch — while removing the manual toil. The indexes rebalance ~quarterly plus ad-hoc, so
# this runs monthly and simply no-ops (no PR) on the months nothing changed.
#
# Auth note: a PR opened with the default GITHUB_TOKEN does NOT trigger other workflows, so CI won't run
# on the auto-PR itself. The "Validate" step re-checks the file's integrity inline (mirrors
# tests/unit/test_index_membership_service.py), and normal CI runs when the PR is merged to main. If your
# branch protection requires status checks on the PR, create a fine-scoped PAT secret (e.g. REFRESH_PAT
# with contents+PR write) and swap it for GITHUB_TOKEN in the last step so CI is triggered on the PR.

on:
  schedule:
    - cron: '0 8 1 * *'      # 08:00 UTC on the 1st of every month
  workflow_dispatch:

concurrency:
  group: refresh-index-membership
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install regeneration dependencies
        run: pip install httpx pandas lxml beautifulsoup4

      - name: Regenerate the membership list
        working-directory: backend
        run: python scripts/refresh_index_membership.py --source wikipedia

      - name: Validate the regenerated list
        working-directory: backend
        run: |
          python - <<'PY'
          import json
          d = json.loads(open("app/data/index_membership.json", encoding="utf-8").read())
          members = d["members"]
          tickers = [m["ticker"] for m in members]
          assert d["count"] == len(tickers) >= 500, f"too few tickers: {len(tickers)}"
          assert len(tickers) == len(set(tickers)), "duplicate tickers"
          assert all(t == t.strip().upper().replace("-", ".") and t for t in tickers), "un-normalized ticker"
          for req in ("AAPL", "MSFT", "NVDA", "BRK.B", "BF.B", "GOOGL", "GOOG"):
              assert req in set(tickers), f"missing mega-cap {req}"
          assert not ({"FDXF", "HONA"} & set(tickers)), "non-trading spin-off artifact present"
          assert all(m.get("indices") for m in members), "entry missing an index label"
          print(f"validated {len(tickers)} members")
          PY

      - name: Open or update PR if the universe changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- backend/app/data/index_membership.json; then
            echo "No index membership changes this run — nothing to do."
            exit 0
          fi
          BRANCH="automation/refresh-index-membership"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add backend/app/data/index_membership.json
          git commit -m "Refresh index membership (S&P 500 / Nasdaq 100)"
          git push --force origin "$BRANCH"
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "Updated the existing open PR for $BRANCH."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "Refresh index membership (S&P 500 / Nasdaq 100)" \
              --body "Automated monthly regeneration of \`backend/app/data/index_membership.json\` from the current S&P 500 + Nasdaq 100 constituents (Wikipedia). Opens only because the indexes changed since the committed list — review the added/removed tickers in the diff and merge to update the calendar's universe. Integrity-checked in-workflow (count >= 500, unique, normalized, mega-caps present, spin-off artifacts absent). Generated by \`.github/workflows/refresh-index-membership.yml\`."
          fi
