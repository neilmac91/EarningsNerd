name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      limit:
        description: 'eval-baseline: number of golden filings (blank = full verified set)'
        required: false
        default: ''

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff bandit
      - name: Lint with Ruff
        # Blocking: the tree is clean and rules live in backend/ruff.toml.
        run: cd backend && ruff check .
      - name: Security scan with Bandit
        run: |
          # Scan app directory, skipping tests
          cd backend && bandit -r app -ll
      - name: Run pytest
        # Fast lane: pytest.ini deselects the performance suite by default (slow-marked tests run
        # here in the default lane). conftest.py sets SECRET_KEY at import, so no env is needed.
        run: cd backend && python -m pytest
      - name: Run performance tests
        # Explicit step (same job, so it stays inside the deploy gate's `needs:` list). Clear the
        # ini addopts and scope to the performance dir so it doesn't collect the whole tree.
        run: cd backend && python -m pytest -o addopts= -m performance tests/performance

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Typecheck (app/library code)
        # Specs are typechecked at runtime by Vitest; this gates shipped code.
        run: npm run typecheck
        working-directory: frontend
      - name: Verify vitest config
        run: |
          ls -la vitest.config.* || echo "No vitest config files found"
          test -f vitest.config.mts && echo "✓ vitest.config.mts exists" || echo "✗ vitest.config.mts not found"
          test ! -f vitest.config.ts && echo "✓ vitest.config.ts correctly removed" || echo "✗ vitest.config.ts still exists"
        working-directory: frontend
      - name: Run unit tests
        run: npx vitest run --config vitest.config.mts
        working-directory: frontend

  # Advisory performance measurement (Lighthouse). Non-blocking by design:
  # continue-on-error + warn-level assertions, and intentionally NOT in the
  # deploy-backend `needs:` gate — it reports scores + a public report URL, it
  # never fails the pipeline. Promote assertions to "error" once a baseline is set.
  #
  # CAVEAT: this runs `next start` with NO backend, so the homepage's server-side
  # data fetches stall/fail and depress LCP/TTFB — the score here UNDERSTATES prod.
  # Treat it as a regression signal for the static shell; get the authoritative
  # number from PageSpeed Insights / Lighthouse against the live or Vercel-preview URL.
  lighthouse:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          WAITLIST_MODE: 'false'
      - name: Lighthouse CI (advisory)
        run: npx lhci autorun
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          WAITLIST_MODE: 'false'

  # Advisory AI-quality regression gate (B1). Non-blocking by design: continue-on-error and
  # intentionally NOT in the deploy-backend `needs:` gate — it reports a quality verdict, it never
  # blocks a deploy. The *gate logic* is already unit-tested for free in backend-tests
  # (tests/unit/test_eval_regression_gate.py); THIS job runs the live production pipeline over the
  # FULL verified golden set (27 filings as of writing — 10-K/10-Q/20-F, up to ~260k chars each) and
  # diffs the result against the pinned baseline_scores.json.
  #
  # Requires a DEEPSEEK_API_KEY *GitHub Actions* secret (the prod key lives in GCP Secret Manager,
  # which CI can't read); the key-check step self-skips with a notice if it's unset. Once armed,
  # this is a real per-run DeepSeek spend, not a token-budget rounding error — it makes 27 real
  # `summarize_filing()` calls (some filings trigger extra section-recovery calls on top). Path-
  # filtered so it only runs when AI-relevant code changes, and evals.runner parallelizes across
  # filings (`--concurrency`, default 5) to keep wall-clock to ~5-8 min instead of ~26 min serial.
  eval-baseline:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    # Each run is a real, ~5-8 min DeepSeek bake-off (see step below). Without this, every new
    # push to an open PR queues another full run on top of the still-running one from the last
    # push — only the latest push's result matters, so cancel superseded runs to stop paying for
    # (and waiting on) throwaway evals. Grouped per-PR so unrelated PRs don't cancel each other.
    concurrency:
      group: eval-baseline-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
      - name: Detect AI-relevant changes
        id: scope
        # Only spend tokens when backend AI code/prompts/evals change (or on manual dispatch).
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          git fetch --depth=1 origin "$BASE" 2>/dev/null || true
          if git diff --name-only "$BASE" HEAD 2>/dev/null | grep -qE '^backend/(app|evals|prompts)/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No AI-relevant backend changes — skipping eval-baseline."
          fi
      - name: Check for eval API key
        id: key
        if: steps.scope.outputs.run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEEPSEEK_API_KEY GitHub Actions secret not set — eval-baseline skipped. Add it under Settings → Secrets and variables → Actions to arm the gate."
          fi
      - name: Set up Python
        if: steps.key.outputs.have == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        if: steps.key.outputs.have == 'true'
        run: pip install -r backend/requirements.txt
      - name: Run baseline eval (deterministic scorers, no judge)
        if: steps.key.outputs.have == 'true'
        working-directory: backend
        # Run the FULL verified set on PRs too: recall is non-saturated now that the golden set carries
        # cash-flow/liquidity facts, so a subset's mean recall isn't apples-to-apples with the full
        # pinned baseline and would flake the gate. Manual dispatch can still pass an explicit limit.
        env:
          SKIP_REDIS_INIT: 'true'
          SECRET_KEY: eval-baseline-secret-key-for-ci-0123456789
          STRIPE_SECRET_KEY: sk_test_ci_eval
          STRIPE_WEBHOOK_SECRET: whsec_ci_eval
          PWNED_PASSWORD_CHECK_ENABLED: 'false'
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com/v1
          AI_DEFAULT_MODEL: deepseek-v4-pro
          USE_STRUCTURED_OUTPUT: 'false'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LIMIT="${{ github.event.inputs.limit }}"
          else
            LIMIT=""
          fi
          ARGS="--candidates baseline --runs 1"
          [ -n "$LIMIT" ] && ARGS="$ARGS --limit $LIMIT"
          echo "Running: python -m evals.runner $ARGS"
          python -m evals.runner $ARGS
      - name: Regression gate vs pinned baseline
        if: steps.key.outputs.have == 'true'
        working-directory: backend
        run: python -m evals.regression_gate --latest
      - name: Upload eval report
        if: always() && steps.key.outputs.have == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-report-${{ github.run_id }}
          path: backend/evals/reports/eval_*.json
          retention-days: 14

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Drop flaky packages.microsoft.com apt source
        # GitHub-hosted runners ship a packages.microsoft.com apt repo (azure-cli + prod)
        # that intermittently returns 403. That aborts the `apt-get update` inside the next
        # step's `playwright install --with-deps`, failing e2e for reasons unrelated to our
        # code — and since deploy-backend gates on e2e, it blocks production deploys too.
        # Nothing here needs that repo, so remove any source referencing it before apt runs.
        # Best-effort: this must never fail the build.
        run: |
          grep -rlE 'packages\.microsoft\.com' /etc/apt/sources.list /etc/apt/sources.list.d/ 2>/dev/null \
            | sudo xargs -r rm -f || true
      - name: Install Playwright browsers
        # `--with-deps` runs apt, which on GitHub-hosted runners intermittently STALLS/errors
        # (mirror outage) — it has hung this job ~9 min and failed it across several runs, blocking
        # deploy-backend (which gates on e2e). Try the full install once, bounded; on failure fall
        # back to a browsers-only Chromium install (Playwright CDN, no apt). The runner image ships
        # the libs Chromium needs, and these tests use Chromium only (no `projects` configured).
        run: |
          timeout 300 npx playwright install --with-deps chromium && exit 0
          echo "::warning::playwright --with-deps failed/stalled (apt); falling back to browsers-only Chromium"
          npx playwright install chromium
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          WAITLIST_MODE: 'false'
      - name: Start frontend server
        run: npm run start &
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          WAITLIST_MODE: 'false'
      - name: Wait for frontend server
        run: npx wait-on http://localhost:3000 --timeout 60000
        working-directory: frontend
      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7

  # Backend continuous deployment to Cloud Run.
  # Runs only on push to main, only after every test job is green, and only
  # when backend/ actually changed (frontend deploys are Vercel's job).
  # Inert until the two repo VARIABLES exist (Settings -> Secrets and
  # variables -> Actions -> Variables): GCP_WIF_PROVIDER, GCP_DEPLOYER_SA.
  # Auth is keyless via Workload Identity Federation - no stored credentials.
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.GCP_WIF_PROVIDER != ''
    concurrency:
      group: deploy-backend
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # mint the OIDC token Workload Identity Federation exchanges
    env:
      IMAGE: us-west1-docker.pkg.dev/earnings-nerd/earningsnerd/backend
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Detect backend changes
        id: changes
        # HEAD^ is the previous main tip (first parent of the merge commit),
        # so this diff covers everything the merge brought in.
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^backend/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
            echo "No backend changes - skipping deploy."
          fi
      - name: Authenticate to Google Cloud
        if: steps.changes.outputs.backend == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
      - name: Set up gcloud
        if: steps.changes.outputs.backend == 'true'
        uses: google-github-actions/setup-gcloud@v3
      - name: Build and push image
        if: steps.changes.outputs.backend == 'true'
        run: |
          gcloud auth configure-docker us-west1-docker.pkg.dev --quiet
          docker build -t "$IMAGE:${GITHUB_SHA::7}" -t "$IMAGE:latest" backend
          docker push --all-tags "$IMAGE"
      - name: Apply database migrations
        if: steps.changes.outputs.backend == 'true'
        # Schema is created for fresh DBs by Base.metadata.create_all(), but that never ALTERs an
        # existing table — so additive column/table migrations in backend/migrations/*.sql must be
        # applied to the prod Cloud SQL DB explicitly. Run them here, BEFORE the new revision serves
        # traffic, so a failed migration blocks the deploy and the new code never hits a missing
        # column. All migration files are idempotent (IF NOT EXISTS / DROP NOT NULL), so re-applying
        # the full set every deploy is safe.
        #
        # Prerequisite (one-time, granted out-of-band): the deployer SA (vars.GCP_DEPLOYER_SA) needs
        #   roles/cloudsql.client  AND  roles/secretmanager.secretAccessor on the DATABASE_URL secret.
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

          # Pull the connection string from Secret Manager and mask it before any use.
          DB_URL="$(gcloud secrets versions access latest --secret=DATABASE_URL)"
          echo "::add-mask::$DB_URL"
          # postgresql://<user>:<pass>@/<dbname>?host=/cloudsql/<PROJECT:REGION:INSTANCE>
          CONN="${DB_URL##*host=/cloudsql/}"; CONN="${CONN%%&*}"
          USERPASS="${DB_URL#*://}"; USERPASS="${USERPASS%%@*}"
          export PGUSER="${USERPASS%%:*}"
          export PGPASSWORD="${USERPASS#*:}"; echo "::add-mask::$PGPASSWORD"
          DBPART="${DB_URL#*@/}"; export PGDATABASE="${DBPART%%\?*}"
          export PGHOST=127.0.0.1 PGPORT=5432

          ./cloud-sql-proxy --port 5432 "$CONN" &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 >/dev/null 2>&1 && break
            sleep 1
          done

          for f in backend/migrations/*.sql; do
            echo "== applying $(basename "$f") =="
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "All migrations applied."
      - name: Deploy Cloud Run service
        if: steps.changes.outputs.backend == 'true'
        run: |
          # Pin the Cloud Run sizing on every deploy so it can't silently drift from these values
          # (previously set only at one-time bootstrap — see docs/DEPLOYMENT.md). min-instances=1
          # keeps one warm instance: no cold starts and the per-process in-memory caches (filings
          # freshness stamp, XBRL L1, tickers) survive between requests (QW4, PR follow-up to the
          # filing-load audit). Raising capacity later = bump --max-instances (keep max × pool under
          # Cloud SQL max_connections).
          gcloud run deploy earningsnerd-backend --region=us-west1 \
            --image="$IMAGE:${GITHUB_SHA::7}" \
            --cpu=1 --memory=1Gi --cpu-boost \
            --min-instances=1 --max-instances=2 --concurrency=40 --timeout=600 \
            --update-secrets=OPENAI_API_KEY=DEEPSEEK_API_KEY:latest \
            --update-env-vars=ENVIRONMENT=production,OPENAI_BASE_URL=https://api.deepseek.com/v1,AI_DEFAULT_MODEL=deepseek-v4-pro,COOKIE_DOMAIN=.earningsnerd.io,SENTRY_RELEASE=${GITHUB_SHA},TRUSTED_PROXY_HOPS=1,ENABLE_GUEST_DAILY_QUOTA=true,ENABLE_FPI_FILINGS=true,STREAM_SECTION_REVEAL=true,REGISTRATION_MODE=invite_only,DB_POOL_SIZE=12,DB_MAX_OVERFLOW=8 \
            --quiet
          # Always route live traffic to the new revision. A prior manual `--no-traffic --tag`
          # deploy can pin traffic to an old revision, which silently makes every CD deploy "dark"
          # (new revision built + healthy at 0% traffic while prod keeps serving the old image).
          gcloud run services update-traffic earningsnerd-backend --region=us-west1 --to-latest --quiet
      - name: Update pregenerate job image
        if: steps.changes.outputs.backend == 'true'
        run: |
          gcloud run jobs update earningsnerd-pregenerate --region=us-west1 \
            --image="$IMAGE:${GITHUB_SHA::7}" \
            --update-secrets=OPENAI_API_KEY=DEEPSEEK_API_KEY:latest \
            --update-env-vars=OPENAI_BASE_URL=https://api.deepseek.com/v1,AI_DEFAULT_MODEL=deepseek-v4-pro,DB_POOL_SIZE=3,DB_MAX_OVERFLOW=2 \
            --quiet
      - name: Update filing-scan + digest + backfill-facts + earnings-calendar job images
        if: steps.changes.outputs.backend == 'true'
        # The jobs + their Cloud Scheduler triggers are created once out-of-band (see DEPLOYMENT.md);
        # CI only bumps the image. Skip each gracefully if it hasn't been created yet so CD never fails.
        run: |
          for job in earningsnerd-filing-scan earningsnerd-filing-digest earningsnerd-backfill-facts earningsnerd-earnings-calendar-refresh earningsnerd-earnings-day-alerts earningsnerd-notable-filings; do
            if gcloud run jobs describe "$job" --region=us-west1 >/dev/null 2>&1; then
              # Jobs run serially, so a tiny DB pool is ample and keeps the Monday cron window from
              # stacking 30-connection pools against Cloud SQL max_connections (see database.py).
              gcloud run jobs update "$job" --region=us-west1 \
                --image="$IMAGE:${GITHUB_SHA::7}" \
                --update-env-vars=DB_POOL_SIZE=3,DB_MAX_OVERFLOW=2 \
                --quiet
            else
              echo "$job not found — create it once per DEPLOYMENT.md. Skipping."
            fi
          done
      - name: Verify health
        if: steps.changes.outputs.backend == 'true'
        run: |
          sleep 10
          # Hit the DEEP check so a revision that boots but can't reach its DB at request time is
          # caught here (shallow /health returns healthy without touching the DB). /health/detailed
          # returns 503 when unhealthy (curl -f fails) and 200 when healthy/degraded; assert the
          # body's status is not "unhealthy" so a degraded-but-serving deploy still passes.
          # curl -f already fails on the 503 an unhealthy check returns; the grep is belt-and-braces
          # and tolerates JSON with or without a space after the colon (FastAPI emits none).
          body=$(curl -fsS https://api.earningsnerd.io/health/detailed)
          echo "$body"
          echo "$body" | grep -qE '"status": ?"unhealthy"' && { echo "Deploy unhealthy — DB unreachable"; exit 1; } || true
          echo "Deployed ${GITHUB_SHA::7} and verified healthy."
